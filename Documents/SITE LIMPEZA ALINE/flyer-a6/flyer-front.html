<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aline's Cleaning — Flyer Front</title>
  <link rel="stylesheet" href="flyer.css">
</head>
<body>

  <div class="flyer">
    <!-- Decorative Accents -->
    <div class="abstract-circle"></div>
    <div class="abstract-accent-top"></div>
    <div class="abstract-sage-footer"></div>

    <div class="safe-zone front-layout">
      
      <header class="brand-header">
        <div class="brand-name">Aline’s Cleaning</div>
        <div class="brand-location">London</div>
      </header>

      <main>
        <div class="line-accent"></div>
        <span class="eyebrow">Professional Care</span>
        <h1 class="headline">Trusted home <br>cleaning <em>in London.</em></h1>
        
        <ul class="services-list">
          <li>Regular Cleaning</li>
          <li>Deep Cleaning</li>
          <li>End of Tenancy Cleaning</li>
        </ul>
      </main>

      <footer class="front-footer">
        <div class="contact-info">
          <div class="contact-item">
            <span class="contact-label">WhatsApp</span>
            <span>07756 204263</span>
          </div>
          <div class="contact-item">
            <span class="contact-label">Website</span>
            <span>alinescleaning.london</span>
          </div>
        </div>
        
        <p class="footer-note">
          Small trusted team • Availability confirmed by message.
        </p>
      </footer>

    </div>
  </div>

</body>
</html>
